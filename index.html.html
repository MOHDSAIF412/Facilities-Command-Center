<!DOCTYPE html>
<html lang="en" data-theme="dark">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FM Ops — Facilities Management Platform</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
  --bg:#0b1120; --bg2:#0f172a; --panel:rgba(255,255,255,.05); --panel2:rgba(255,255,255,.08);
  --stroke:rgba(255,255,255,.10); --txt:#e5edf7; --muted:#93a4bd; --brand:#6366f1; --brand2:#8b5cf6;
  --ok:#10b981; --warn:#f59e0b; --bad:#ef4444; --info:#38bdf8; --shadow:0 10px 40px rgba(0,0,0,.45);
}
[data-theme="light"]{
  --bg:#eef2f9; --bg2:#f7f9fd; --panel:rgba(255,255,255,.75); --panel2:#ffffff;
  --stroke:rgba(15,23,42,.10); --txt:#0f172a; --muted:#5b6b85; --shadow:0 10px 30px rgba(15,23,42,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;color:var(--txt);
  background:radial-gradient(1200px 600px at 80% -10%,rgba(99,102,241,.25),transparent),
             radial-gradient(1000px 500px at -10% 20%,rgba(139,92,246,.18),transparent),var(--bg);
  min-height:100vh;overflow-x:hidden}
.app{display:flex;min-height:100vh}
/* Sidebar */
.side{width:248px;flex:none;padding:18px 14px;background:var(--panel);backdrop-filter:blur(20px);
  border-right:1px solid var(--stroke);position:sticky;top:0;height:100vh;overflow-y:auto;transition:.25s}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
.logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--brand),var(--brand2));
  display:grid;place-items:center;font-weight:800;color:#fff;box-shadow:0 6px 20px rgba(99,102,241,.5)}
.brand b{font-size:16px;letter-spacing:.3px}.brand span{font-size:11px;color:var(--muted)}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;color:var(--muted);
  text-decoration:none;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:3px;transition:.15s}
.nav a:hover{background:var(--panel2);color:var(--txt)}
.nav a.active{background:linear-gradient(135deg,rgba(99,102,241,.28),rgba(139,92,246,.18));color:var(--txt);
  box-shadow:inset 0 0 0 1px var(--stroke)}
.nav a .ic{width:20px;text-align:center}
.nav .badge{margin-left:auto;background:var(--bad);color:#fff;font-size:10px;padding:1px 7px;border-radius:20px;font-weight:700}
.navlabel{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:14px 12px 6px;opacity:.7}
/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:14px 22px;
  background:var(--panel);backdrop-filter:blur(20px);border-bottom:1px solid var(--stroke)}
.top h1{font-size:19px;font-weight:700}.top .sub{font-size:12px;color:var(--muted)}
.search{flex:1;max-width:420px;position:relative}
.search input{width:100%;padding:9px 14px 9px 36px;border-radius:11px;border:1px solid var(--stroke);
  background:var(--panel2);color:var(--txt);font-size:13px;outline:none}
.search .si{position:absolute;left:12px;top:9px;color:var(--muted)}
.iconbtn{width:40px;height:40px;border-radius:11px;border:1px solid var(--stroke);background:var(--panel2);
  color:var(--txt);cursor:pointer;font-size:16px;display:grid;place-items:center;position:relative;transition:.15s}
.iconbtn:hover{background:var(--panel)}
.iconbtn .dot{position:absolute;top:7px;right:8px;width:9px;height:9px;border-radius:50%;background:var(--bad);border:2px solid var(--bg2)}
.content{padding:22px;flex:1}
.hide{display:none!important}
/* Cards */
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
.card{background:var(--panel);border:1px solid var(--stroke);border-radius:18px;padding:18px;
  backdrop-filter:blur(16px);box-shadow:var(--shadow)}
.kpi{position:relative;overflow:hidden;transition:.2s;cursor:pointer}
.kpi:hover{transform:translateY(-4px);box-shadow:0 16px 44px rgba(99,102,241,.28)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--ac,var(--brand)),transparent)}
.hero{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:18px;
  background:linear-gradient(120deg,rgba(99,102,241,.32),rgba(139,92,246,.14) 55%,transparent)}
.hero h2{font-size:23px;font-weight:800;letter-spacing:.2px}
.hero p{font-size:12.5px;color:var(--muted);margin-top:4px}
.ring{width:96px;height:96px;border-radius:50%;display:grid;place-items:center;text-align:center;
  background:conic-gradient(var(--ok) calc(var(--p)*1%),var(--panel2) 0);position:relative;flex:none}
.ring::before{content:'';position:absolute;inset:8px;border-radius:50%;background:var(--bg2)}
.ring div{position:relative}
.ring b{font-size:19px;display:block}
.ring small{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.eq{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;transition:.18s}
.eq:hover{transform:translateY(-3px);border-color:var(--brand)}
.eq .e-ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;background:var(--panel2);flex:none}
.eq b{font-size:20px;font-weight:800;line-height:1.1;display:block}
.eq .e-l{font-size:11.5px;color:var(--muted);font-weight:600}
.eq small{font-size:10px;color:var(--ok)}
.kpi .k-ic{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:20px;margin-bottom:12px}
.kpi .k-val{font-size:30px;font-weight:800;line-height:1}
.kpi .k-lbl{font-size:12.5px;color:var(--muted);margin-top:6px;font-weight:500}
.kpi .k-trend{font-size:11px;margin-top:8px;font-weight:600}
.charts{grid-template-columns:repeat(2,1fr)}
.chart-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.chart-h b{font-size:14.5px}.chart-h span{font-size:11px;color:var(--muted)}
.chart-box{position:relative;height:240px}
/* Toolbar / table */
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
.toolbar .grow{flex:1;min-width:120px}
select,input[type=text],input[type=date],input[type=number],input[type=email],textarea{
  padding:9px 12px;border-radius:10px;border:1px solid var(--stroke);background:var(--panel2);
  color:var(--txt);font-size:13px;outline:none;font-family:inherit}
select:focus,input:focus,textarea:focus{border-color:var(--brand)}
.btn{padding:9px 16px;border-radius:11px;border:1px solid var(--stroke);background:var(--panel2);color:var(--txt);
  font-size:13px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:var(--panel)}
.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));border:none;color:#fff;
  box-shadow:0 6px 18px rgba(99,102,241,.4)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.danger{color:var(--bad)}
.tablewrap{overflow-x:auto;border-radius:14px;border:1px solid var(--stroke)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
th{text-align:left;padding:12px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--muted);background:var(--panel2);position:sticky;top:0}
td{padding:11px 14px;border-top:1px solid var(--stroke)}
tr:hover td{background:var(--panel2)}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;white-space:nowrap}
.p-ok{background:rgba(16,185,129,.18);color:#34d399}
.p-warn{background:rgba(245,158,11,.18);color:#fbbf24}
.p-bad{background:rgba(239,68,68,.18);color:#f87171}
.p-info{background:rgba(56,189,248,.18);color:#7dd3fc}
.p-mut{background:var(--panel2);color:var(--muted)}
.rowbtns{display:flex;gap:6px}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .e-ic{font-size:40px;opacity:.4;margin-bottom:10px}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(3,7,18,.65);backdrop-filter:blur(4px);z-index:100;
  display:grid;place-items:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--stroke);border-radius:20px;width:100%;max-width:720px;
  max-height:88vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;
  border-bottom:1px solid var(--stroke);position:sticky;top:0;background:var(--bg2);z-index:2}
.modal-h b{font-size:16px}
.modal-body{padding:22px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;color:var(--muted);font-weight:600}
.field input,.field select,.field textarea{width:100%}
.modal-f{padding:16px 22px;border-top:1px solid var(--stroke);display:flex;justify-content:flex-end;gap:10px;
  position:sticky;bottom:0;background:var(--bg2)}
/* Notifications drawer */
.drawer{position:fixed;top:0;right:0;height:100vh;width:380px;max-width:90vw;background:var(--bg2);
  border-left:1px solid var(--stroke);z-index:90;transform:translateX(100%);transition:.28s;
  box-shadow:var(--shadow);display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-h{padding:18px 20px;border-bottom:1px solid var(--stroke);display:flex;justify-content:space-between;align-items:center}
.drawer-body{overflow-y:auto;padding:12px;flex:1}
.note{display:flex;gap:12px;padding:12px;border-radius:12px;border:1px solid var(--stroke);margin-bottom:9px;background:var(--panel)}
.note .n-ic{width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;font-size:15px}
.note b{font-size:13px}.note p{font-size:12px;color:var(--muted);margin-top:2px}
.note small{font-size:10.5px;color:var(--muted)}
/* Calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dow{text-align:center;font-size:11px;color:var(--muted);font-weight:700;padding:6px}
.cal .day{min-height:82px;border:1px solid var(--stroke);border-radius:10px;padding:6px;background:var(--panel2);font-size:11px}
.cal .day .dn{font-weight:700;color:var(--muted)}
.cal .day.today{border-color:var(--brand);box-shadow:inset 0 0 0 1px var(--brand)}
.cal .ev{margin-top:3px;padding:2px 5px;border-radius:5px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* misc */
.section-title{font-size:15px;font-weight:700;margin:6px 0 4px}
.muted{color:var(--muted)}
.flexbtwn{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);z-index:200;
  background:var(--bg2);border:1px solid var(--stroke);padding:12px 20px;border-radius:12px;box-shadow:var(--shadow);
  font-size:13px;font-weight:600;transition:.3s;display:flex;align-items:center;gap:9px}
.toast.show{transform:translateX(-50%) translateY(0)}
.hamb{display:none}
@media(max-width:900px){
  .charts{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}
  .side{position:fixed;z-index:80;left:0;transform:translateX(-100%)}
  .side.open{transform:translateX(0)}
  .hamb{display:grid}
}
</style>
</head>
<body>
<div class="app">

  <aside class="side" id="side">
    <div class="brand">

    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="top">
      <button class="iconbtn hamb" onclick="document.getElementById('side').classList.toggle('open')">☰</button>

      </div>
      <div class="search">
        <span class="si">🔍</span>

      <button class="iconbtn" onclick="toggleTheme()" title="Theme">🌓</button>
      <button class="iconbtn" onclick="openNotes()" title="Notifications"><span id="bell">🔔</span><span class="dot hide" id="notedot"></span></button>
    </header>
    <div class="content" id="view"></div>

</div>

<div class="drawer" id="drawer">

</div>

<div id="modalRoot"></div>

/* status → pill class */
function pillClass(v){
 v=(v||'').toLowerCase();
 if(['completed','closed','done','operational','passed'].some(x=>v.includes(x)))return'p-ok';
 if(['overdue','faulty','critical','open','high'].some(x=>v===x||v.includes(x)))return v==='open'?'p-warn':'p-bad';
 if(['upcoming','in progress','standby','to do','pending','medium'].some(x=>v.includes(x)))return'p-info';
 return'p-mut';
}
function priClass(v){ v=(v||'').toLowerCase(); if(v==='critical'||v==='high')return'p-bad'; if(v==='medium')return'p-warn'; return'p-mut'; }
function daysBadge(d){ const n=daysBetween(d); if(n===null)return'<span class="pill p-mut">—</span>';
 if(n<0)return`<span class="pill p-bad">${Math.abs(n)}d overdue</span>`;
 if(n<=15)return`<span class="pill p-warn">${n}d left</span>`;
 if(n<=45)return`<span class="pill p-info">${n}d left</span>`;
 return`<span class="pill p-ok">${n}d left</span>`; }

// live status for PPM/incident/capa/task considering due date
function liveStatus(mod,r){
 const s=(r.status||'').toLowerCase();
 if(['completed','closed','done'].some(x=>s.includes(x)))return r.status;
 const n=daysBetween(r.dueDate);
 if(n!==null&&n<0)return'Overdue';
 return r.status;
}
function overdueCount(){
 let c=0;
 DB.ppm.forEach(r=>{ if(liveStatus('ppm',r)==='Overdue')c++; });
 DB.incidents.forEach(r=>{ if(liveStatus('incidents',r)==='Overdue')c++; });
 DB.capa.forEach(r=>{ if(liveStatus('capa',r)==='Overdue')c++; });
 DB.tasks.forEach(r=>{ const n=daysBetween(r.dueDate); if(r.status!=='Done'&&n!==null&&n<0)c++; });
 return c;
}

      ${statuses.length?`<select onchange="setF('${mod}','status',this.value)"><option value="">All Status</option>${statuses.map(b=>`<option ${FILTER[mod].status===b?'selected':''}>${esc(b)}</option>`).join('')}</select>`:''}

 renderTable(mod);
}
function setF(mod,k,v){ FILTER[mod][k]=v; renderTable(mod); }
function rows(mod){
 const f=FILTER[mod]||{};
 return DB[mod].filter(r=>{
  if(f.building&&r.building!==f.building)return false;
  if(f.status&&liveStatus(mod,r)!==f.status&&r.status!==f.status)return false;
  if(f.q){ const q=f.q.toLowerCase(); if(!Object.values(r).some(v=>String(v).toLowerCase().includes(q)))return false; }
  return true;
 });
}
function renderTable(mod){
 const s=SCHEMAS[mod]; const data=rows(mod);
 const el=$('#modTable'); if(!el)return;
 if(!data.length){ el.innerHTML=`<div class="card empty"><div class="e-ic">${s.icon}</div>No records match. Click “Add” to create one.</div>`; return; }
 el.innerHTML=`<div class="tablewrap"><table><thead><tr>
   ${s.cols.map(c=>`<th>${esc(COL_LABELS[c]||cap(c))}</th>`).join('')}<th>Actions</th></tr></thead><tbody>
   ${data.map(r=>`<tr>${s.cols.map(c=>`<td>${cellVal(mod,c,r)}</td>`).join('')}
   <td><div class="rowbtns">
     <button class="btn sm" onclick="openForm('${mod}','${r.id}')">Edit</button>
     ${(mod==='ppm'||mod==='incidents'||mod==='contractors')?`<button class="btn sm" onclick="quickSend('${mod}','${r.id}')" title="Email/WhatsApp">✉</button>`:''}
     <button class="btn sm danger" onclick="del('${mod}','${r.id}')">Del</button>
   </div></td></tr>`).join('')}
 </tbody></table></div>`;
}
function cap(s){ return s.replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase()); }
function cellVal(mod,c,r){
 if(c==='__days')return daysBadge(r.expiryDate);
 if(c==='__file')return r.fileData?`<a class="btn sm" download="${esc(r.fileName||'file')}" href="${r.fileData}">⤓ ${esc((r.fileName||'file').slice(0,16))}</a>`:'<span class="pill p-mut">No file</span>';
 let v=r[c];
 if(['status'].includes(c)){ const ls=liveStatus(mod,r); return `<span class="pill ${pillClass(ls)}">${esc(ls)}</span>`; }
 if(c==='priority'||c==='severity')return `<span class="pill ${priClass(v)}">${esc(v)}</span>`;
 if(c==='progress')return `<div style="min-width:90px"><div style="background:var(--panel2);border-radius:6px;height:7px;overflow:hidden"><div style="width:${+v||0}%;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2))"></div></div><small class="muted">${+v||0}%</small></div>`;
 if(['insuranceExpiry','civilDefenseExpiry','warrantyExpiry','endDate'].includes(c))return `${esc(v||'—')}<br>${daysBadge(v)}`;
 return esc(v||'—');
}

function openForm(mod,id){

function closeModal(){ $('#modalRoot').innerHTML=''; }
function readFileAsData(f){ return new Promise(res=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(f); }); }
async function saveForm(mod,id){
 const s=SCHEMAS[mod]; const rec=id?DB[mod].find(r=>r.id===id):{id:uid()};
 for(const f of s.fields){
  const el=$('#f_'+f.k); if(!el)continue;
  if(f.t==='file'){
   if(el.files&&el.files[0]){
    const file=el.files[0];
    if(file.size>2*1024*1024){ alert('File too large — max 2 MB. Keep big files in your folder and note the filename in Remarks.'); return; }
    rec.fileName=file.name; rec.fileData=await readFileAsData(file);
   }
  } else rec[f.k]=el.value;
 }
 if(!id)DB[mod].push(rec);
 try{ save(); }catch(e){ alert('Browser storage is full — delete some attachments or export data first.'); return; }
 closeModal(); toast(id?'Record updated':'Record created'); renderTable(mod); refreshChrome();
}
function del(mod,id){

}

function collectNotes(){
 const N=[];
 DB.ppm.forEach(r=>{ const n=daysBetween(r.dueDate); const s=(r.status||'').toLowerCase();
   if(['completed'].includes(s))return;
   if(n<0)N.push({sev:'bad',ic:'🛠️',t:`PPM ${r.ppmNo} overdue`,d:`${r.asset} — ${Math.abs(n)} days past due`,when:r.dueDate});
   else if(n<=30)N.push({sev:n<=7?'bad':'warn',ic:'🛠️',t:`PPM ${r.ppmNo} due in ${n}d`,d:`${r.asset} • ${r.contractor}`,when:r.dueDate}); });
 [['insuranceExpiry','Insurance'],['tradeLicenseExpiry','Trade License'],['civilDefenseExpiry','Civil Defense'],['endDate','Contract']].forEach(([k,lbl])=>{
   DB.contractors.forEach(c=>{ const n=daysBetween(c[k]); if(n!==null&&n<=30)N.push({sev:n<0?'bad':n<=15?'warn':'info',ic:'🏗️',t:`${lbl} ${n<0?'expired':'expiring'} — ${c.company}`,d:`${n<0?Math.abs(n)+'d ago':n+'d left'} (${c[k]})`,when:c[k]}); }); });
 DB.documents.forEach(d=>{ const n=daysBetween(d.expiryDate); if(n!==null&&n<=30)N.push({sev:n<0?'bad':n<=15?'warn':'info',ic:'📄',t:`${d.type} ${n<0?'expired':'expiring'}`,d:`${d.name} • ${n<0?Math.abs(n)+'d ago':n+'d left'}`,when:d.expiryDate}); });
 DB.capa.forEach(r=>{ if((r.status||'').toLowerCase()==='closed')return; const n=daysBetween(r.dueDate); if(n!==null&&n<=15)N.push({sev:n<0?'bad':'warn',ic:'✅',t:`CAPA ${n<0?'overdue':'due soon'}`,d:`${r.action.slice(0,50)} • ${r.owner}`,when:r.dueDate}); });
 DB.tasks.forEach(r=>{ if(r.status==='Done')return; const n=daysBetween(r.dueDate); if(n!==null&&n<=7)N.push({sev:n<0?'bad':'warn',ic:'📋',t:`Task ${n<0?'overdue':'due soon'}`,d:`${r.title} • ${r.assignee}`,when:r.dueDate}); });
 return N.sort((a,b)=>new Date(a.when)-new Date(b.when));
}
function buildNotes(){
 const N=collectNotes(); const list=$('#noteList');
 $('#notedot').classList.toggle('hide',N.length===0);
 list.innerHTML=N.length?N.map(x=>`<div class="note"><div class="n-ic ${x.sev==='bad'?'p-bad':x.sev==='warn'?'p-warn':'p-info'}">${x.ic}</div>
   <div><b>${esc(x.t)}</b><p>${esc(x.d)}</p><small>${esc(x.when||'')}</small></div></div>`).join('')
   :`<div class="empty"><div class="e-ic">🎉</div>All clear — no alerts.</div>`;
}
function openNotes(){ buildNotes(); $('#drawer').classList.add('open'); }
function closeNotes(){ $('#drawer').classList.remove('open'); }

/* ============================= DASHBOARD ============================= */
let CHARTS=[];
function renderDashboard(){
 CHARTS.forEach(c=>{try{c.destroy()}catch(e){}}); CHARTS=[];
 const ppm=DB.ppm, inc=DB.incidents;
 const st=x=>DB.ppm.filter(r=>liveStatus('ppm',r)===x).length;
 const comp=compliancePct();
 const kpi=[
  {v:DB.contractors.length,l:'Total Subcontractors',ic:'🏗️',c:'--brand',m:'contractors'},
  {v:ppm.length,l:'Total PPM',ic:'🛠️',c:'--brand2',m:'ppm'},
  {v:st('Completed'),l:'Completed PPM',ic:'✅',c:'--ok',m:'ppm',s:'Completed'},
  {v:st('Upcoming')+st('In Progress'),l:'Active / Upcoming',ic:'⏳',c:'--info',m:'ppm',s:'Upcoming'},
  {v:st('Overdue'),l:'Overdue PPM',ic:'⚠️',c:'--bad',m:'ppm',s:'Overdue'},
  {v:inc.filter(r=>r.status!=='Closed').length,l:'Open Incidents',ic:'🚨',c:'--warn',m:'incidents',s:'Open'},
  {v:inc.filter(r=>r.status==='Closed').length,l:'Closed Incidents',ic:'🛡️',c:'--ok',m:'incidents',s:'Closed'},
  {v:DB.qsheReports.length,l:'QSHE Reports',ic:'📑',c:'--info',m:'qsheReports'},
  {v:DB.capa.filter(r=>r.status!=='Closed').length,l:'Open CAPA',ic:'📌',c:'--warn',m:'capa',s:'Open'},
  {v:DB.tasks.filter(r=>r.status!=='Done').length,l:'Active Tasks',ic:'📋',c:'--brand',m:'tasks'},
  {v:DB.documents.filter(d=>{const n=daysBetween(d.expiryDate);return n!==null&&n<=30}).length,l:'Expiring Docs',ic:'📄',c:'--bad',m:'documents'}
 ];
 const EQUIP=[['Chiller','❄️'],['Elevator','🛗'],['Generator','⚡'],['Fire Fighting','🧯'],['CCTV','📹'],['Gate Barrier','🚧'],['Sliding Door','🚪'],['HVAC','🌀']];
 const eqHtml=EQUIP.map(([cat,ic])=>{
   const a=DB.assets.filter(x=>x.category===cat);
   const op=a.filter(x=>x.status==='Operational').length;
   return `<div class="card eq" onclick="eqGo('${cat}')" title="Open asset register — ${cat}">
     <div class="e-ic">${ic}</div>
     <div><b>${a.length}</b><span class="e-l">${cat}</span><br><small>${op} operational</small></div></div>`;
 }).join('');
 $('#view').innerHTML=`
  <div class="card hero">
    <div><h2>Facilities Command Center</h2>
      <p>${new Date().toLocaleDateString('en',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} • ${DB.assets.length} assets • ${[...new Set(DB.assets.map(a=>a.building))].length} buildings • ${DB.contractors.length} subcontractors</p></div>
    <div class="ring" style="--p:${comp}"><div><b>${comp}%</b><small>Compliance</small></div></div>
  </div>
  <div class="grid kpis" style="margin-bottom:18px">
   ${kpi.map(k=>`<div class="card kpi" style="--ac:var(${k.c})" onclick="kpiGo('${k.m}','${k.s||''}')" title="Open ${k.l}">
     <div class="k-ic" style="background:color-mix(in srgb,var(${k.c}) 22%,transparent);color:var(${k.c})">${k.ic}</div>
     <div class="k-val" style="color:var(${k.c})">${k.v}</div><div class="k-lbl">${k.l}</div></div>`).join('')}
  </div>
  <div class="section-title">Equipment Scorecard</div>
  <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(158px,1fr));margin:10px 0 18px">${eqHtml}</div>
  <div class="grid charts">
   <div class="card"><div class="chart-h"><b>PPM Status Distribution</b><span>live</span></div><div class="chart-box"><canvas id="c1"></canvas></div></div>
   <div class="card"><div class="chart-h"><b>Incident Trend (by type)</b><span>all time</span></div><div class="chart-box"><canvas id="c2"></canvas></div></div>
   <div class="card"><div class="chart-h"><b>Subcontractor Workload (PPM)</b><span>assigned jobs</span></div><div class="chart-box"><canvas id="c3"></canvas></div></div>
   <div class="card"><div class="chart-h"><b>Document Expiry Timeline</b><span>next 90 days</span></div><div class="chart-box"><canvas id="c4"></canvas></div></div>
  </div>`;
 try{ if(window.Chart) drawCharts(); else document.querySelectorAll('.chart-box').forEach(b=>b.innerHTML='<p class="muted" style="text-align:center;padding-top:90px">Charts need an internet connection to load.</p>'); }catch(e){ console.error(e); }
 buildNotes();
}
function eqGo(cat){ FILTER.assets={q:cat,status:'',building:''}; go('assets'); }
function kpiGo(mod,status){ if(!mod||!SCHEMAS[mod])return; FILTER[mod]={q:'',status:status||'',building:''}; go(mod); }
function compliancePct(){
 let total=0,ok=0;
 DB.documents.forEach(d=>{ total++; if(daysBetween(d.expiryDate)>=0)ok++; });
 DB.contractors.forEach(c=>{['insuranceExpiry','tradeLicenseExpiry','civilDefenseExpiry'].forEach(k=>{total++; if(daysBetween(c[k])>=0)ok++;});});
 DB.ppm.forEach(r=>{ total++; if(liveStatus('ppm',r)!=='Overdue')ok++; });
 return total?Math.round(ok/total*100):100;
}
function css(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function drawCharts(){
 const grid=css('--stroke'),txt=css('--muted');
 Chart.defaults.color=txt; Chart.defaults.borderColor=grid; Chart.defaults.font.family="'Inter','Segoe UI',sans-serif";
 const cnt=(arr,f)=>{const m={};arr.forEach(x=>{const k=f(x)||'—';m[k]=(m[k]||0)+1});return m;};
 // c1 PPM status doughnut
 const ps=cnt(DB.ppm,r=>liveStatus('ppm',r));
 CHARTS.push(new Chart($('#c1'),{type:'doughnut',data:{labels:Object.keys(ps),datasets:[{data:Object.values(ps),
   backgroundColor:['#38bdf8','#6366f1','#10b981','#ef4444','#f59e0b'],borderWidth:0}]},
   options:{plugins:{legend:{position:'right'}},cutout:'62%',maintainAspectRatio:false}}));
 // c2 incidents by type bar
 const it=cnt(DB.incidents,r=>r.type);
 CHARTS.push(new Chart($('#c2'),{type:'bar',data:{labels:Object.keys(it),datasets:[{data:Object.values(it),
   backgroundColor:'#8b5cf6',borderRadius:6}]},options:{plugins:{legend:{display:false}},maintainAspectRatio:false,
   scales:{x:{grid:{display:false}},y:{ticks:{stepSize:1},grid:{color:grid}}}}}));
 // c3 contractor workload
 const cw=cnt(DB.ppm,r=>r.contractor);
 CHARTS.push(new Chart($('#c3'),{type:'bar',data:{labels:Object.keys(cw),datasets:[{data:Object.values(cw),
   backgroundColor:'#6366f1',borderRadius:6}]},options:{indexAxis:'y',plugins:{legend:{display:false}},maintainAspectRatio:false,
   scales:{x:{ticks:{stepSize:1},grid:{color:grid}},y:{grid:{display:false}}}}}));
 // c4 doc expiry timeline (buckets)
 const buckets={'Overdue':0,'0-15d':0,'16-30d':0,'31-60d':0,'61-90d':0};
 DB.documents.concat(DB.contractors.map(c=>({expiryDate:c.insuranceExpiry}))).forEach(d=>{
   const n=daysBetween(d.expiryDate); if(n===null)return;
   if(n<0)buckets['Overdue']++;else if(n<=15)buckets['0-15d']++;else if(n<=30)buckets['16-30d']++;else if(n<=60)buckets['31-60d']++;else if(n<=90)buckets['61-90d']++; });
 CHARTS.push(new Chart($('#c4'),{type:'line',data:{labels:Object.keys(buckets),datasets:[{data:Object.values(buckets),
   fill:true,tension:.35,borderColor:'#38bdf8',backgroundColor:'rgba(56,189,248,.18)',pointBackgroundColor:'#38bdf8'}]},
   options:{plugins:{legend:{display:false}},maintainAspectRatio:false,scales:{y:{ticks:{stepSize:1},grid:{color:grid}},x:{grid:{display:false}}}}}));
}

/* ============================= CALENDAR ============================= */
let CAL_M=new Date().getMonth(),CAL_Y=new Date().getFullYear();
function calEvents(){
 const E={};
 const add=(d,txt,cls)=>{ if(!d)return; (E[d]=E[d]||[]).push({txt,cls}); };
 DB.ppm.forEach(r=>add(r.dueDate,`🛠 ${r.ppmNo}`,'p-info'));
 DB.incidents.forEach(r=>add(r.dueDate,`⚠ ${r.incidentNo}`,'p-warn'));
 DB.capa.forEach(r=>add(r.dueDate,`✅ CAPA`,'p-warn'));
 DB.tasks.forEach(r=>add(r.dueDate,`📋 ${r.title.slice(0,10)}`,'p-info'));
 DB.documents.forEach(r=>add(r.expiryDate,`📄 ${r.type}`,'p-bad'));
 DB.contractors.forEach(c=>add(c.insuranceExpiry,`🏗 Insurance ${c.company.slice(0,6)}`,'p-bad'));
 return E;
}
function renderCalendar(){
 const E=calEvents(); const first=new Date(CAL_Y,CAL_M,1); const start=first.getDay();
 const days=new Date(CAL_Y,CAL_M+1,0).getDate(); const mn=first.toLocaleString('en',{month:'long'});
 let cells='';
 ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>cells+=`<div class="dow">${d}</div>`);
 for(let i=0;i<start;i++)cells+=`<div class="day" style="opacity:.35"></div>`;
 for(let d=1;d<=days;d++){
  const iso=`${CAL_Y}-${String(CAL_M+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const isToday=iso===todayISO(); const evs=E[iso]||[];
  cells+=`<div class="day ${isToday?'today':''}"><div class="dn">${d}</div>
    ${evs.slice(0,3).map(e=>`<div class="ev ${e.cls}">${esc(e.txt)}</div>`).join('')}
    ${evs.length>3?`<div class="ev p-mut">+${evs.length-3} more</div>`:''}</div>`;
 }
 $('#view').innerHTML=`<div class="card">
   <div class="flexbtwn" style="margin-bottom:14px">
     <b style="font-size:16px">${mn} ${CAL_Y}</b>
     <div class="rowbtns"><button class="btn sm" onclick="calNav(-1)">‹ Prev</button>
       <button class="btn sm" onclick="calToday()">Today</button>
       <button class="btn sm" onclick="calNav(1)">Next ›</button></div>
   </div>
   <div class="cal">${cells}</div>
 </div>`;
}
function calNav(d){ CAL_M+=d; if(CAL_M<0){CAL_M=11;CAL_Y--;} if(CAL_M>11){CAL_M=0;CAL_Y++;} renderCalendar(); }
function calToday(){ CAL_M=new Date().getMonth(); CAL_Y=new Date().getFullYear(); renderCalendar(); }

/* ============================= REPORTS / AI ============================= */
function renderReports(){
 $('#view').innerHTML=`
  <div class="grid" style="grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
   <div class="card"><div class="section-title">🤖 Ask the FM Assistant</div>
     <p class="muted" style="font-size:12px;margin-bottom:12px">Instant answers computed from your live data (offline).</p>
     <div class="toolbar" style="margin:0"><input class="grow" id="aiQ" placeholder="e.g. show overdue PPM, expiring docs, worst contractor…" onkeydown="if(event.key==='Enter')askAI()"><button class="btn primary" onclick="askAI()">Ask</button></div>
     <div class="rowbtns" style="flex-wrap:wrap;margin-top:10px">
       ${['Overdue PPM','Expiring this week','Open incidents','Subcontractor summary','Executive summary'].map(q=>`<button class="btn sm" onclick="document.getElementById('aiQ').value='${q}';askAI()">${q}</button>`).join('')}
     </div>
     <div id="aiOut" style="margin-top:14px"></div>
   </div>
   <div class="card"><div class="section-title">📑 One-Click Reports</div>
     <p class="muted" style="font-size:12px;margin-bottom:12px">Export current data to CSV (opens in Excel).</p>
     <div class="rowbtns" style="flex-wrap:wrap">
       ${Object.keys(SCHEMAS).map(m=>`<button class="btn sm" onclick="exportCSV('${m}')">⤓ ${SCHEMAS[m].title}</button>`).join('')}
     </div>
     <div class="section-title" style="margin-top:18px">Snapshot</div>
     <div id="snap"></div>
   </div>
  </div>`;
 $('#snap').innerHTML=aiExecutive();
 askAIDefault();
}
function askAIDefault(){ $('#aiOut').innerHTML=`<p class="muted" style="font-size:12px">Try a question above.</p>`; }
function askAI(){
 const q=($('#aiQ').value||'').toLowerCase(); let out='';
 if(/overdue/.test(q)&&/ppm/.test(q)){ const r=DB.ppm.filter(x=>liveStatus('ppm',x)==='Overdue');
   out=aiList('Overdue PPM',r.map(x=>`${x.ppmNo} — ${x.asset} (${x.building}) • ${Math.abs(daysBetween(x.dueDate))}d late • ${x.contractor}`)); }
 else if(/expir|week|document|doc/.test(q)){ const r=DB.documents.filter(d=>{const n=daysBetween(d.expiryDate);return n!==null&&n<=7;});
   out=aiList('Expiring within 7 days',r.map(d=>`${d.name} (${d.type}) • ${daysBetween(d.expiryDate)}d • ${d.owner}`)); }
 else if(/incident|open/.test(q)){ const r=DB.incidents.filter(x=>x.status!=='Closed');
   out=aiList('Open incidents',r.map(x=>`${x.incidentNo} — ${x.type} • ${x.building} • ${x.severity} • due ${x.dueDate}`)); }
 else if(/contractor|kpi|worst|lowest/.test(q)){ out=aiContractors(); }
 else if(/exec|summary|report|management/.test(q)){ out=aiExecutive(); }
 else out=`<div class="card" style="background:var(--panel2)"><p class="muted">I can answer: overdue PPM, expiring documents, open incidents, contractor performance, executive summary. Try one of the chips above.</p></div>`;
 $('#aiOut').innerHTML=out;
}
function aiList(title,items){
 if(!items.length)return `<div class="card" style="background:var(--panel2)"><b>${title}</b><p class="muted" style="margin-top:6px">None 🎉</p></div>`;
 return `<div class="card" style="background:var(--panel2)"><b>${title} (${items.length})</b>
   <ul style="margin:10px 0 0 18px;font-size:13px;line-height:1.7">${items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`;
}
function aiContractors(){
 const rows=DB.contractors.map(c=>{
   const jobs=DB.ppm.filter(p=>p.contractor===c.company);
   const done=jobs.filter(p=>liveStatus('ppm',p)==='Completed').length;
   const over=jobs.filter(p=>liveStatus('ppm',p)==='Overdue').length;
   const kpi=jobs.length?Math.round(done/jobs.length*100):0;
   return {c:c.company,jobs:jobs.length,done,over,kpi};
 }).sort((a,b)=>a.kpi-b.kpi);
 const worst=rows[0];
 return `<div class="card" style="background:var(--panel2)"><b>Subcontractor performance</b>
   <p class="muted" style="font-size:12px;margin:6px 0">Lowest KPI: <b style="color:var(--bad)">${worst?worst.c:'—'}</b> (${worst?worst.kpi:0}%)</p>
   <div class="tablewrap"><table><thead><tr><th>Subcontractor</th><th>Jobs</th><th>Done</th><th>Overdue</th><th>KPI</th></tr></thead><tbody>
   ${rows.map(r=>`<tr><td>${esc(r.c)}</td><td>${r.jobs}</td><td>${r.done}</td><td>${r.over}</td><td><span class="pill ${r.kpi>=70?'p-ok':r.kpi>=40?'p-warn':'p-bad'}">${r.kpi}%</span></td></tr>`).join('')}
   </tbody></table></div></div>`;
}
function aiExecutive(){
 const over=overdueCount(); const comp=compliancePct();
 const expDocs=DB.documents.filter(d=>{const n=daysBetween(d.expiryDate);return n!==null&&n<=30}).length;
 const openInc=DB.incidents.filter(r=>r.status!=='Closed').length;
 return `<div class="card" style="background:var(--panel2)">
   <p style="font-size:13px;line-height:1.8">
   As of <b>${todayISO()}</b>, the portfolio holds <b>${DB.assets.length} assets</b> across <b>${[...new Set(DB.assets.map(a=>a.building))].length} buildings</b>,
   maintained by <b>${DB.contractors.length} contractors</b>.
   PPM compliance stands at <b style="color:${comp>=80?'var(--ok)':'var(--warn)'}">${comp}%</b>, with
   <b style="color:var(--bad)">${over} overdue item(s)</b> requiring attention.
   There are <b>${openInc} open incident(s)</b> and <b style="color:var(--bad)">${expDocs} document(s)/certificate(s) expiring within 30 days</b>.
   ${over>0?'Priority: clear overdue PPM and renew expiring compliance documents.':'Portfolio is on track.'}
   </p></div>`;
}

/* ============================= SEARCH ============================= */
function globalSearch(q){
 q=q.trim().toLowerCase();
 if(q.length<2){ if(ROUTE==='search')go('dashboard'); return; }
 ROUTE='search'; renderNav();
 setTitle('Search results',`for “${q}”`);
 let html='';
 Object.keys(SCHEMAS).forEach(mod=>{
   const hits=DB[mod].filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(q)));
   if(hits.length){ const s=SCHEMAS[mod];
     html+=`<div class="card" style="margin-bottom:14px"><div class="section-title">${s.icon} ${s.title} (${hits.length})</div>
       <div class="tablewrap"><table><thead><tr>${s.cols.slice(0,4).map(c=>`<th>${esc(COL_LABELS[c]||cap(c))}</th>`).join('')}<th></th></tr></thead><tbody>
       ${hits.slice(0,8).map(r=>`<tr>${s.cols.slice(0,4).map(c=>`<td>${cellVal(mod,c,r)}</td>`).join('')}
        <td><button class="btn sm" onclick="go('${mod}');setTimeout(()=>openForm('${mod}','${r.id}'),50)">Open</button></td></tr>`).join('')}
       </tbody></table></div></div>`;
   }
 });
 $('#view').innerHTML=html||`<div class="card empty"><div class="e-ic">🔍</div>No matches for “${esc(q)}”.</div>`;
}

/* ============================= EXPORT ============================= */
function exportCSV(mod){
 const s=SCHEMAS[mod]; const keys=s.fields.map(f=>f.k);
 const head=keys.join(',');
 const body=DB[mod].map(r=>keys.map(k=>`"${String(r[k]??'').replace(/"/g,'""')}"`).join(',')).join('\n');
 const blob=new Blob([head+'\n'+body],{type:'text/csv'});
 const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${mod}_${todayISO()}.csv`; a.click();
 toast(`Exported ${DB[mod].length} ${mod} rows`);
}

/* ============================= INIT ============================= */
renderNav(); route(); buildNotes();
</script>
